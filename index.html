<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Third Voyage</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>
</head>

<body>

  <h1>Voyages in Destiny – The Third Voyage</h1>

  <div class="controls">
    <button id="prevBtn">◀ Prev</button>
    <button id="nextBtn">Next ▶</button>
  </div>

  <!-- Flipbook (desktop/tablet) -->
  <div id="book">
    <div class="page dummy-page"></div>
    <div class="page"><img src="pages/page1.jpg" alt="Front cover"></div>

    <div class="page"><img src="pages/page2.jpg" alt="Page 2"></div>
    <div class="page"><img src="pages/page3.jpg" alt="Page 3"></div>
    <div class="page"><img src="pages/page4.jpg" alt="Page 4"></div>
    <div class="page"><img src="pages/page5.jpg" alt="Page 5"></div>
    <div class="page"><img src="pages/page6.jpg" alt="Page 6"></div>
    <div class="page"><img src="pages/page7.jpg" alt="Page 7"></div>
    <div class="page"><img src="pages/page8.jpg" alt="Page 8"></div>
    <div class="page"><img src="pages/page9.jpg" alt="Page 9"></div>
    <div class="page"><img src="pages/page10.jpg" alt="Page 10"></div>
    <div class="page"><img src="pages/page11.jpg" alt="Page 11"></div>
    <div class="page"><img src="pages/page12.jpg" alt="Page 12"></div>
    <div class="page"><img src="pages/page13.jpg" alt="Page 13"></div>
    <div class="page"><img src="pages/page14.jpg" alt="Page 14"></div>
    <div class="page"><img src="pages/page15.jpg" alt="Page 15"></div>
    <div class="page"><img src="pages/page16.jpg" alt="Page 16"></div>
    <div class="page"><img src="pages/page17.jpg" alt="Page 17"></div>
    <div class="page"><img src="pages/page18.jpg" alt="Back cover"></div>

    <div class="page dummy-page"></div>
  </div>

  <!-- Mobile fallback -->
  <div id="mobilePages">
    <img src="pages/page1.jpg">
    <img src="pages/page2.jpg">
    <img src="pages/page3.jpg">
    <img src="pages/page4.jpg">
    <img src="pages/page5.jpg">
    <img src="pages/page6.jpg">
    <img src="pages/page7.jpg">
    <img src="pages/page8.jpg">
    <img src="pages/page9.jpg">
    <img src="pages/page10.jpg">
    <img src="pages/page11.jpg">
    <img src="pages/page12.jpg">
    <img src="pages/page13.jpg">
    <img src="pages/page14.jpg">
    <img src="pages/page15.jpg">
    <img src="pages/page16.jpg">
    <img src="pages/page17.jpg">
    <img src="pages/page18.jpg">
  </div>

  <!-- Sound -->
  <audio id="flipSound" preload="auto">
    <source src="page-flip.mp3" type="audio/mpeg">
  </audio>

  <script>
    const sound = document.getElementById("flipSound");

    function playFlip() {
      if (!sound) return;
      sound.pause();
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    let lastFlipSoundTime = 0;

    function triggerFlipSound() {
      const now = Date.now();
      if (now - lastFlipSoundTime < 300) return;
      lastFlipSoundTime = now;
      playFlip();
    }

    // Only initialize flipbook on larger screens
    if (window.innerWidth > 700) {
      const bookElement = document.getElementById("book");

      const pageFlip = new St.PageFlip(bookElement, {
        width: 512,
        height: 512,
        size: "stretch",
        minWidth: 250,
        maxWidth: 1100,
        minHeight: 250,
        maxHeight: 1100,
        drawShadow: false,
        maxShadowOpacity: 0,
        showCover: false,
        mobileScrollSupport: true,
        usePortrait: true,
        autoSize: true,
        flippingTime: 700,
        useMouseEvents: true,
        disableFlipByClick: false
      });

      pageFlip.loadFromHTML(document.querySelectorAll("#book .page"));

      document.getElementById("nextBtn").addEventListener("click", () => {
        triggerFlipSound();
        pageFlip.flipNext("top");
      });

      document.getElementById("prevBtn").addEventListener("click", () => {
        triggerFlipSound();
        pageFlip.flipPrev("top");
      });

      // Trigger sound when user starts dragging a page
      bookElement.addEventListener("pointerdown", () => {
        triggerFlipSound();
      });
    }
  </script>

</body>
</html>
