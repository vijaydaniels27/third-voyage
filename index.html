<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Third Voyage</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>
</head>

<body>

  <h1>Voyages in Destiny – The Third Voyage</h1>

  <div class="controls">
    <button id="prevBtn">◀ Prev</button>
    <button id="nextBtn">Next ▶</button>
  </div>

  <div id="book">
    <!-- Opening spread -->
    <div class="page dummy-page"></div>
    <div class="page"><img src="pages/page1.jpg" alt="Front cover"></div>

    <!-- Interior pages -->
    <div class="page"><img src="pages/page2.jpg" alt="Page 2"></div>
    <div class="page"><img src="pages/page3.jpg" alt="Page 3"></div>
    <div class="page"><img src="pages/page4.jpg" alt="Page 4"></div>
    <div class="page"><img src="pages/page5.jpg" alt="Page 5"></div>
    <div class="page"><img src="pages/page6.jpg" alt="Page 6"></div>
    <div class="page"><img src="pages/page7.jpg" alt="Page 7"></div>
    <div class="page"><img src="pages/page8.jpg" alt="Page 8"></div>
    <div class="page"><img src="pages/page9.jpg" alt="Page 9"></div>
    <div class="page"><img src="pages/page10.jpg" alt="Page 10"></div>
    <div class="page"><img src="pages/page11.jpg" alt="Page 11"></div>
    <div class="page"><img src="pages/page12.jpg" alt="Page 12"></div>
    <div class="page"><img src="pages/page13.jpg" alt="Page 13"></div>
    <div class="page"><img src="pages/page14.jpg" alt="Page 14"></div>
    <div class="page"><img src="pages/page15.jpg" alt="Page 15"></div>
    <div class="page"><img src="pages/page16.jpg" alt="Page 16"></div>
    <div class="page"><img src="pages/page17.jpg" alt="Page 17"></div>
    <div class="page"><img src="pages/page18.jpg" alt="Back cover"></div>

    <!-- Closing spread -->
    <div class="page dummy-page"></div>
  </div>
<audio id="flipSound" src="page-flip.mp3" preload="auto"></audio>
  <script>
  const pageFlip = new St.PageFlip(document.getElementById("book"), {
    width: 512,
    height: 512,
    size: "stretch",
    minWidth: 250,
    maxWidth: 1100,
    minHeight: 250,
    maxHeight: 1100,
    drawShadow: false,
    maxShadowOpacity: 0,
    showCover: false,
    mobileScrollSupport: false,
    usePortrait: true,
    autoSize: true,
    flippingTime: 700
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".page"));

  const sound = document.getElementById("flipSound");

  function playFlip() {
    sound.currentTime = 0;
    sound.play();
  }

  document.getElementById("nextBtn").addEventListener("click", () => {
    pageFlip.flipNext("top");
    playFlip();
  });

  document.getElementById("prevBtn").addEventListener("click", () => {
    pageFlip.flipPrev("top");
    playFlip();
  });
</script>

</body>
</html>
